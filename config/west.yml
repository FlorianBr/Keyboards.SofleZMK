manifest:
  remotes:
    - name: zmkfirmware
      url-base: https://github.com/zmkfirmware
    - name: urob
      url-base: https://github.com/urob
    - name: prospector
      url-base: https://github.com/t-ogura
    - name: siddhantac
      url-base: https://github.com/siddhantac 

  projects:
    # ZMK Base Firmware
    - name: zmk
      remote: zmkfirmware
      revision: v0.3
      import: app/west.yml
    # ZMK-Unicode: For german unicode chars
    - name: zmk-unicode
      remote: urob
      revision: v0.3 # Must match the ZMK main
    # Prospector Dongle
    - name: prospector-zmk-module
      remote: prospector
      revision: v1.1.1
      path: modules/prospector-zmk-module
    # Araska Anim on right display
    - name: nice-view
      remote: siddhantac 
      revision: main 

  self:
    path: config
